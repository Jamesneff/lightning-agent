<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightning Capital{% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0f1e;
      --sidebar-bg:   #060b16;
      --card-bg:      #0d1528;
      --card-hover:   #111e35;
      --border:       #1a2744;
      --accent:       #3b82f6;
      --accent-dark:  #2563eb;
      --accent-glow:  rgba(59, 130, 246, 0.12);
      --text:         #e2e8f0;
      --text-dim:     #94a3b8;
      --text-muted:   #4a5568;
      --success:      #10b981;
      --warning:      #f59e0b;
      --error:        #ef4444;
      --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono:         'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      width: 224px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 26px 22px 22px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-bolt {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59, 130, 246, 0.4);
    }

    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }

    .logo-sub {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 6px;
    }

    .sidebar-nav { padding: 18px 0; flex: 1; }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 22px 4px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 22px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13.5px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--accent-glow);
      border-left-color: rgba(59,130,246,0.3);
    }

    .nav-link.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
    }

    .nav-icon {
      width: 17px;
      text-align: center;
      font-style: normal;
      font-size: 14px;
      opacity: 0.85;
    }

    .sidebar-footer {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
    }
    .status-dot.running {
      background: var(--accent);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Main ───────────────────────────────────────────────────────────── */
    .main {
      margin-left: 224px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .page {
      padding: 38px 44px;
      max-width: 1080px;
      width: 100%;
    }

    .page-header { margin-bottom: 28px; }

    .page-header h1 {
      font-size: 23px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .page-header p {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 13px;
    }

    /* ── Cards ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
    }

    .card-title {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.15s;
      font-family: var(--font);
      line-height: 1;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,130,246,0.25);
    }
    .btn-primary:hover { background: var(--accent-dark); box-shadow: 0 2px 16px rgba(59,130,246,0.4); }

    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { color: var(--text); border-color: #2a3a5c; background: var(--card-hover); }

    .btn-lg { padding: 11px 26px; font-size: 14.5px; }

    /* ── Tables ─────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      text-align: left;
      padding: 9px 14px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card-hover); }

    td { padding: 11px 14px; color: var(--text-dim); }
    td a { color: var(--accent); text-decoration: none; }
    td a:hover { text-decoration: underline; }

    /* ── Badges ─────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .badge-complete     { background: rgba(16,185,129,0.12); color: var(--success); }
    .badge-running      { background: rgba(59,130,246,0.12); color: var(--accent); }
    .badge-failed       { background: rgba(239,68,68,0.12);  color: var(--error); }
    .badge-interrupted  { background: rgba(245,158,11,0.12); color: var(--warning); }

    /* ── Stat grid ──────────────────────────────────────────────────────── */
    .stat-row { display: flex; gap: 0; }

    .stat {
      flex: 1;
      padding: 4px 0;
      border-right: 1px solid var(--border);
      padding-right: 24px;
      margin-right: 24px;
    }
    .stat:last-child { border-right: none; margin-right: 0; }

    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .stat-label {
      font-size: 10.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-top: 3px;
    }

    /* ── Utilities ──────────────────────────────────────────────────────── */
    .flex     { display: flex; }
    .gap-2    { gap: 8px; }
    .gap-3    { gap: 12px; }
    .mb-5     { margin-bottom: 20px; }
    .mb-6     { margin-bottom: 24px; }
    .mb-8     { margin-bottom: 32px; }
    .text-muted   { color: var(--text-muted); }
    .text-accent  { color: var(--accent); }
    .text-success { color: var(--success); }
    .text-error   { color: var(--error); }
    .text-warning { color: var(--warning); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3a5c; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-bolt">⚡</div>
        <div class="logo-text">Lightning Capital</div>
      </div>
      <div class="logo-sub">Deal Flow Intelligence</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="/"        class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
        <i class="nav-icon">◈</i> Dashboard
      </a>
      {% if run_active %}
      <a href="/run"     class="nav-link {% if request.endpoint == 'run_page' %}active{% endif %}" style="color:var(--accent)">
        <i class="nav-icon"><span class="status-dot running" style="display:inline-block;vertical-align:middle;margin-right:1px"></span></i> View Live Run
      </a>
      {% else %}
      <a href="/run"     class="nav-link {% if request.endpoint == 'run_page' %}active{% endif %}">
        <i class="nav-icon">▶</i> Run Agent
      </a>
      {% endif %}
      <a href="/history" class="nav-link {% if request.endpoint == 'history' or request.endpoint == 'run_detail' %}active{% endif %}">
        <i class="nav-icon">☰</i> History
      </a>
      <a href="/last-run" class="nav-link {% if request.endpoint == 'last_run_log' %}active{% endif %}">
        <i class="nav-icon">🔍</i> Last Run Log
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="status-dot" id="g-status-dot"></div>
      <span id="g-status-text">Pipeline idle</span>
    </div>
  </nav>

  <div class="main">
    <div class="page">
      {% block content %}{% endblock %}
    </div>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
